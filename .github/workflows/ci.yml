name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: python -m pip install .

      - name: Compile source
        run: python -m compileall -q src tests

      - name: Run tests
        run: python -m unittest discover -s tests -v

  container:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build container
        run: docker build --tag obsidian-assistant:test .

  openclaw-plugin:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up supported Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: npm
          cache-dependency-path: integrations/openclaw-capture/package-lock.json

      - name: Install locked plugin dependencies
        working-directory: integrations/openclaw-capture
        run: npm ci

      - name: Type-check against OpenClaw and run plugin tests
        working-directory: integrations/openclaw-capture
        run: npm run check

      - name: Verify package contents
        working-directory: integrations/openclaw-capture
        run: npm pack --dry-run
